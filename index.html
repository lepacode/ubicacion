<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obtener Ubicación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0f1a;
            color: #fff;
        }

        .container {
            background: #1a1a2e;
            padding: 3rem 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 480px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #e0e0ff;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #8888aa;
            margin-bottom: 2rem;
        }

        .btn {
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border: none;
            color: #fff;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.4);
            width: 100%;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.55);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .progress-container {
            margin-top: 2rem;
            height: 8px;
            background: #2a2a44;
            border-radius: 10px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .progress-container.active {
            opacity: 1;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6c5ce7, #a855f7, #ec4899);
            background-size: 200% 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
            animation: shimmer 1.2s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .status {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #aaaacc;
            min-height: 1.5rem;
        }

        .result {
            margin-top: 1.5rem;
            padding: 1.2rem;
            background: #12122a;
            border-radius: 16px;
            border: 1px solid #2a2a4a;
            display: none;
            animation: fadeSlide 0.5s ease;
        }

        .result.show {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .coord {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid #222244;
            font-size: 0.95rem;
        }

        .coord:last-child {
            border-bottom: none;
        }

        .coord-label {
            color: #8888aa;
        }

        .coord-value {
            color: #c4b5fd;
            font-weight: 500;
            font-family: 'Courier New', monospace;
        }

        .coord-value.lat {
            color: #67e8f9;
        }

        .coord-value.lng {
            color: #f472b6;
        }

        .error {
            margin-top: 1rem;
            color: #f87171;
            font-size: 0.9rem;
            min-height: 1.5rem;
        }

        .location-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="location-icon">📍</span>
        <h1>Tu Ubicación</h1>
        <p class="subtitle">Verificación de ubicación del restaurante</p>

        <button class="btn" id="btnObtener">📍 Verificar mi ubicación</button>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <p class="status" id="status">Haz clic en el botón para comenzar</p>

        <div class="result" id="result">
            <div class="coord">
                <span class="coord-label">Latitud</span>
                <span class="coord-value lat" id="latitud">--</span>
            </div>
            <div class="coord">
                <span class="coord-label">Longitud</span>
                <span class="coord-value lng" id="longitud">--</span>
            </div>
            <div class="coord">
                <span class="coord-label">Precisión</span>
                <span class="coord-value" id="precision">--</span>
            </div>
            <div class="coord">
                <span class="coord-label">Dirección</span>
                <span class="coord-value" id="direccion" style="color:#86efac;font-size:0.85rem;text-align:right;max-width:220px">--</span>
            </div>
            <div class="coord">
                <span class="coord-label">Dist. al restaurante</span>
                <span class="coord-value" id="distancia" style="font-size:1.1rem;font-weight:700">--</span>
            </div>
        </div>

        <p class="error" id="error"></p>
    </div>

    <script>
        const RESTAURANT = { lat: -26.8302912, lng: -65.2037331 };
        const RESTAURANT_DIRECCION = 'T4000 San Miguel de Tucumán, Tucumán, Argentina';

        const btn = document.getElementById('btnObtener');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const latitudEl = document.getElementById('latitud');
        const longitudEl = document.getElementById('longitud');
        const precisionEl = document.getElementById('precision');
        const direccionEl = document.getElementById('direccion');
        const errorEl = document.getElementById('error');
        const distanciaEl = document.getElementById('distancia');

        let progressInterval = null;
        let gpsTimedOut = false;

        function resetUI() {
            clearInterval(progressInterval);
            progressBar.style.width = '0%';
            progressContainer.classList.remove('active');
            result.classList.remove('show');
            errorEl.textContent = '';
        }

        function simulateProgress() {
            progressContainer.classList.add('active');
            progressBar.style.width = '0%';
            let p = 0;
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                p += Math.random() * 6 + 2;
                if (p >= 95) { p = 95; clearInterval(progressInterval); }
                progressBar.style.width = Math.min(p, 95) + '%';
            }, 200);
        }

        function completeProgress() {
            clearInterval(progressInterval);
            progressBar.style.width = '100%';
            setTimeout(() => {
                progressContainer.classList.remove('active');
                progressBar.style.width = '0%';
            }, 600);
        }

        function calcDist(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function showResult(lat, lng, precision, direccion, distM) {
            latitudEl.textContent = lat.toFixed(6);
            longitudEl.textContent = lng.toFixed(6);
            precisionEl.textContent = precision;
            direccionEl.textContent = direccion || 'No disponible';
            if (distM !== null && distM !== undefined) {
                if (distM < 1000) {
                    distanciaEl.textContent = Math.round(distM) + ' m';
                    distanciaEl.style.color = '#86efac';
                } else {
                    distanciaEl.textContent = (distM / 1000).toFixed(1) + ' km';
                    distanciaEl.style.color = '#f87171';
                }
            } else {
                distanciaEl.textContent = '--';
            }
            result.classList.add('show');
        }

        async function reverseGeocode(lat, lng) {
            try {
                const res = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&addressdetails=1`,
                    { headers: { 'Accept-Language': 'es' } }
                );
                const data = await res.json();
                return (data && data.display_name) || null;
            } catch { return null; }
        }

        async function fetchIP() {
            const apis = [
                async () => {
                    const r = await fetch('https://ipinfo.io/json', { signal: AbortSignal.timeout(5000) });
                    const d = await r.json();
                    const [lat, lng] = (d.loc || '').split(',').map(Number);
                    if (!isNaN(lat) && !isNaN(lng)) return { lat, lng };
                    return null;
                },
                async () => {
                    const r = await fetch('https://geolocation-db.com/json/', { signal: AbortSignal.timeout(5000) });
                    const d = await r.json();
                    const lat = parseFloat(d.latitude);
                    const lng = parseFloat(d.longitude);
                    if (!isNaN(lat) && !isNaN(lng)) return { lat, lng };
                    return null;
                }
            ];
            for (const api of apis) {
                try { const r = await api(); if (r) return r; } catch {}
            }
            return null;
        }

        async function obtenerPorIP() {
            status.textContent = '📍 Buscando ubicación por IP...';
            const coords = await fetchIP();
            if (!coords) return false;

            status.textContent = '🔍 Obteniendo dirección...';
            const direccion = await reverseGeocode(coords.lat, coords.lng);
            btn.disabled = false; completeProgress();
            const dist = calcDist(coords.lat, coords.lng, RESTAURANT.lat, RESTAURANT.lng);
            status.textContent = '✅ Ubicación aproximada por IP';
            showResult(coords.lat, coords.lng, '~' + coords.lat.toFixed(1) + ' (IP)', direccion, dist);
            return true;
        }

        async function iniciar() {
            resetUI();
            gpsTimedOut = false;

            status.textContent = 'Obteniendo ubicación...';
            btn.disabled = true;
            simulateProgress();

            const seguroGPS = setTimeout(() => {
                gpsTimedOut = true;
            }, 12000);

            if (!navigator.geolocation) {
                clearTimeout(seguroGPS);
                status.textContent = '📡 GPS no soportado, usando IP...';
                if (!(await obtenerPorIP())) {
                    btn.disabled = false; completeProgress();
                    status.textContent = '❌ Sin ubicación disponible';
                    errorEl.textContent = 'No se pudo obtener ubicación por ningún método.';
                }
                return;
            }

            function intentarLocalizacion(altaPrecision, timeoutMs) {
                return new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: altaPrecision,
                        timeout: timeoutMs,
                        maximumAge: 0
                    });
                });
            }

            (async () => {
                try {
                    const pos = await intentarLocalizacion(false, 8000);
                    if (gpsTimedOut) return;
                    clearTimeout(seguroGPS);

                    let lat = pos.coords.latitude;
                    let lng = pos.coords.longitude;
                    let acc = Math.round(pos.coords.accuracy);

                    if (acc > 30) {
                        status.textContent = `📡 Baja precisión (${acc}m), probando GPS...`;
                        try {
                            const pos2 = await intentarLocalizacion(true, 10000);
                            if (gpsTimedOut) return;
                            const lat2 = pos2.coords.latitude;
                            const lng2 = pos2.coords.longitude;
                            const acc2 = Math.round(pos2.coords.accuracy);
                            if (acc2 <= acc) {
                                lat = lat2; lng = lng2; acc = acc2;
                            }
                        } catch {}
                        if (acc > 30) {
                            status.textContent = `📡 Precisión insuficiente (${acc}m), usando IP...`;
                            if (!(await obtenerPorIP())) {
                                btn.disabled = false; completeProgress();
                                status.textContent = '⚠️ Sin ubicación';
                                errorEl.textContent = 'No se pudo obtener ubicación precisa.';
                            }
                            return;
                        }
                    }

                    status.textContent = '🔍 Obteniendo dirección...';
                    const direccion = await reverseGeocode(lat, lng);
                    btn.disabled = false; completeProgress();
                    const dist = calcDist(lat, lng, RESTAURANT.lat, RESTAURANT.lng);
                    status.textContent = '✅ Ubicación obtenida';
                    showResult(lat, lng, acc + ' m', direccion, dist);
                } catch (err) {
                    if (gpsTimedOut) return;
                    clearTimeout(seguroGPS);
                    if (err.code === err.PERMISSION_DENIED) {
                        status.textContent = '📡 Permiso denegado, usando IP...';
                    } else {
                        status.textContent = '📡 GPS no disponible, usando IP...';
                    }
                    if (!(await obtenerPorIP())) {
                        btn.disabled = false; completeProgress();
                        status.textContent = '❌ Sin ubicación';
                        errorEl.textContent = 'No se pudo obtener ubicación. Verifica tu conexión.';
                    }
                }
            })();
        }

        btn.addEventListener('click', iniciar);
    </script>
</body>
</html>
